<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | FundForGood</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

    <div class="logo-container">

        <div class="logo-icon">
            ❤
        </div>

        <div class="logo-text">
            FundForGood
        </div>

    </div>


    <nav>

        <a href="01-index.html">Home</a>

        <a href="05-campaign.html">Campaigns</a>

        <a href="02-login.html" class="nav-btn">
            Login
        </a>

        <a href="03-register.html">
            Register
        </a>

    </nav>


</header>





<section class="login-section">



<div class="login-image">


    <div class="overlay">

        <h1>
            Welcome Back ❤️
        </h1>


        <p>
            Continue supporting causes
            and changing lives.
        </p>


    </div>


</div>







<div class="login-container">


<div class="login-card">


<h2>
Login
</h2>


<p class="subtitle">
Access your FundForGood account
</p>





<form id="loginForm">



<label>
Email
</label>


<input 
type="email"
id="email"
placeholder="Enter your email"
required>





<label>
Password
</label>


<input 
type="password"
id="password"
placeholder="Enter your password"
required>






<div class="login-options">


<label>

<input type="checkbox">

Remember me

</label>



<a href="#">
Forgot Password?
</a>


</div>





<button 
type="submit"
class="btn">

Login

</button>





</form>





<p class="register-text">

Don't have an account?

<a href="03-register.html">
Create Account
</a>


</p>




</div>


</div>


</section>







<footer>


<div>

<h3>
FundForGood ❤
</h3>


<p>
Together we can make a difference.
</p>


</div>




<p>
© 2026 FundForGood
</p>


</footer>





<script src="js/06-login.js"></script>


</body>

</html>
