<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Campaign | FundForGood</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>


<div class="logo-container">

    <div class="logo-icon">
        ❤
    </div>


    <div class="logo-text">
        FundForGood
    </div>


</div>




<nav>

    <a href="01-index.html">
        Home
    </a>


    <a href="05-campaign.html">
        Campaigns
    </a>


    <a href="04-create.html" class="nav-btn">
        Create Campaign
    </a>


    <a href="02-login.html">
        Logout
    </a>


</nav>


</header>






<section class="create-section">


<div class="create-image">


<div class="overlay">


<h1>
Create Change 🌱
</h1>


<p>
Start a campaign and bring people together
for a meaningful cause.
</p>


</div>


</div>








<div class="create-container">


<div class="create-card">


<h2>
Create Campaign
</h2>


<p class="subtitle">
Share your cause with the community
</p>





<form id="campaignForm">



<label>
Campaign Title
</label>


<input 
type="text"
id="title"
placeholder="Enter campaign title"
required>






<label>
Description
</label>


<textarea
id="description"
placeholder="Describe your campaign"
rows="5"
required></textarea>







<label>
Category
</label>


<select id="category">


<option value="Education">
Education
</option>


<option value="Medical">
Medical
</option>


<option value="Environment">
Environment
</option>


<option value="Community">
Community
</option>


<option value="Other">
Other
</option>


</select>







<label>
Funding Goal
</label>


<input 
type="number"
id="goal"
placeholder="Enter required amount"
required>







<label>
Campaign Image URL
</label>


<input
type="text"
id="image"
placeholder="Paste image URL">







<label>
Creator Name
</label>


<input
type="text"
id="creator"
placeholder="Your name"
required>







<button 
type="submit"
class="btn">

Create Campaign

</button>




</form>





</div>


</div>



</section>







<footer>


<div>

<h3>
FundForGood ❤
</h3>


<p>
Together we can make a difference.
</p>


</div>



<p>
© 2026 FundForGood
</p>



</footer>






<script src="js/07-create-campaign.js"></script>


</body>


</html>
