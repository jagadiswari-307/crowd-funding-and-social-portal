<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | FundForGood</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

    <div class="logo-container">

        <div class="logo-icon">
            ❤
        </div>

        <div class="logo-text">
            FundForGood
        </div>

    </div>


    <nav>

        <a href="01-index.html">Home</a>
        <a href="05-campaign.html">Campaigns</a>
        <a href="02-login.html">Login</a>

        <a href="03-register.html" class="nav-btn">
            Join Us
        </a>

    </nav>


</header>




<section class="register-section">



<div class="register-image">


    <div class="overlay">

        <h1>
            Join Our Community 🌱
        </h1>


        <p>
            Create an account and become part of
            a movement that changes lives.
        </p>


    </div>


</div>





<div class="register-container">


    <div class="register-card">


        <h2>
            Create Account
        </h2>


        <p class="subtitle">
            Start your journey with FundForGood
        </p>



        <form id="registerForm">


            <label>Name</label>

            <input 
            type="text" 
            id="name"
            placeholder="Enter your name"
            required>



            <label>Email</label>

            <input 
            type="email" 
            id="email"
            placeholder="Enter your email"
            required>



            <label>Password</label>

            <input 
            type="password" 
            id="password"
            placeholder="Create a password"
            required>



            <button type="submit" class="btn">
                Register
            </button>


        </form>




        <p class="register-text">

            Already have an account?

            <a href="02-login.html">
                Login Here
            </a>

        </p>




    </div>


</div>


</section>






<footer>


<div>

<h3>
FundForGood ❤
</h3>

<p>
Together we can make a difference.
</p>

</div>



<p>
© 2026 FundForGood
</p>


</footer>




<script src="js/05-register.js"></script>

<script>
    console.log("Register page loaded");
</script>


</body>

</html>
